<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang đang tạm dừng</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --xanh-dam:#0f2c4d;
    --xanh:#1d5fb4;
    --xanh-sang:#4f9bf0;
    --vang:#fbbf24;
    --trang:#ffffff;
    --xam-chu:#5b6b80;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Be Vietnam Pro',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--xanh-dam);
    background:linear-gradient(135deg,#0b1f3a 0%,#123a6b 45%,#1d5fb4 100%);
    position:relative;
    overflow:hidden;
  }
  /* Các vòng tròn ánh sáng trang trí nền */
  body::before,body::after{
    content:"";position:absolute;border-radius:50%;filter:blur(8px);opacity:.18;
  }
  body::before{width:520px;height:520px;background:#4f9bf0;top:-160px;right:-120px}
  body::after{width:460px;height:460px;background:#fbbf24;bottom:-180px;left:-120px;opacity:.14}

  .the{
    position:relative;
    width:100%;
    max-width:560px;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:28px;
    padding:54px 44px 44px;
    text-align:center;
    box-shadow:0 30px 80px rgba(5,18,40,.45);
    animation:hien .7s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes hien{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

  /* Dải màu trên đỉnh thẻ */
  .vien-tren{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:120px;height:6px;border-radius:0 0 8px 8px;
    background:linear-gradient(90deg,var(--vang),var(--xanh-sang));
  }

  .huy-hieu{
    width:116px;height:116px;margin:0 auto 26px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    background:radial-gradient(circle at 50% 36%,#ffffff 0%,#eef2f7 68%,#dde5ee 100%);
    box-shadow:0 16px 34px rgba(15,44,77,.28),inset 0 3px 6px rgba(255,255,255,.95),inset 0 -4px 10px rgba(150,170,195,.30);
    position:relative;
  }
  .huy-hieu .nhip{
    position:absolute;inset:0;border-radius:50%;
    border:2px solid rgba(122,201,82,.55);
    animation:nhip 2.4s ease-out infinite;
  }
  @keyframes nhip{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.45);opacity:0}}
  .huy-hieu svg{width:80px;height:80px}

  h1{
    font-size:27px;font-weight:700;line-height:1.35;margin-bottom:14px;
    letter-spacing:-.01em;
  }
  h1 .nhanh{color:var(--xanh)}
  .mo-ta{
    font-size:16px;font-weight:400;color:var(--xam-chu);
    line-height:1.7;max-width:420px;margin:0 auto 30px;
  }

  .duong-ke{height:1px;background:linear-gradient(90deg,transparent,#dce4ef,transparent);margin:30px 0}

  .lien-he-tieu-de{
    font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--xanh);margin-bottom:18px;
  }
  .nhom-nut{display:flex;flex-direction:column;gap:12px}
  .nut{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:15px 22px;border-radius:16px;font-size:16px;font-weight:600;
    text-decoration:none;transition:transform .15s ease,box-shadow .2s ease;
  }
  .nut svg{width:20px;height:20px;flex:none}
  .nut-chinh{
    background:linear-gradient(135deg,#1d5fb4,#0f2c4d);color:#fff;
    box-shadow:0 10px 22px rgba(29,95,180,.4);
  }
  .nut-phu{
    background:#f1f5fb;color:var(--xanh-dam);border:1px solid #e0e8f2;
  }
  .nut:hover{transform:translateY(-2px)}
  .nut-chinh:hover{box-shadow:0 14px 28px rgba(29,95,180,.5)}

  .chan{
    margin-top:34px;font-size:13px;color:#9aa7b8;font-weight:400;line-height:1.6;
  }
  .chan strong{color:var(--xanh);font-weight:600}

  @media(max-width:480px){
    .the{padding:42px 26px 32px;border-radius:22px}
    h1{font-size:22px}
    .mo-ta{font-size:15px}
    .huy-hieu{width:100px;height:100px}
    .huy-hieu svg{width:68px;height:68px}
  }
</style>
</head>
<body>
  <main class="the" role="alert" aria-live="polite">
    <span class="vien-tren"></span>

    <div class="huy-hieu" aria-hidden="true">
      <span class="nhip"></span>
      <!-- Logo Trường Mầm non Nghi Văn: mầm cây -->
      <svg viewBox="12 10 40 35" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="la1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a8e650"/><stop offset="100%" stop-color="#5dba2f"/>
          </linearGradient>
          <linearGradient id="la2" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8edc40"/><stop offset="100%" stop-color="#4aab20"/>
          </linearGradient>
        </defs>
        <ellipse cx="32" cy="38" rx="10" ry="6" fill="#8B6B52"/>
        <ellipse cx="32" cy="37" rx="9" ry="5" fill="#9B7B62"/>
        <path d="M32 36C32 36 31 24 32 18" stroke="#6BBF3B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M33 22C38 14 46 12 49 15C51 17 47 24 40 27C35 29 33 26 33 22Z" fill="url(#la1)"/>
        <path d="M31 26C26 19 18 17 15 20C13 22 17 28 24 30C29 32 31 29 31 26Z" fill="url(#la2)"/>
        <path d="M34 30C37 26 42 25 44 27C45 28 43 32 38 33C35 34 34 32 34 30Z" fill="#a8e650" opacity="0.8"/>
      </svg>
    </div>

    <h1>Trang đang <span class="nhanh">tạm dừng</span></h1>
    <p class="mo-ta">
      Rất tiếc, trang web hiện đang tạm ngừng hoạt động.
      Quý đơn vị vui lòng liên hệ <strong>đơn vị thiết kế</strong> để tiếp tục sử dụng dịch vụ.
    </p>
  </main>
</body>
</html>
